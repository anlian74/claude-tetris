<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tetris</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="wrapper">
    <h1 class="title">TETRIS</h1>
    <div class="game-container">
      <canvas id="board" width="300" height="600"></canvas>

      <aside class="panel">
        <div class="panel-section theme-toggle">
          <button id="theme-toggle" class="theme-btn" type="button" aria-pressed="false">
            <span id="theme-icon" class="theme-icon" aria-hidden="true">🌙</span>
            <span id="theme-text">Dark</span>
          </button>
        </div>

        <div class="panel-section">
          <span class="label">SCORE</span>
          <span class="value" id="score">0</span>
        </div>
        <div class="panel-section">
          <span class="label">LINES</span>
          <span class="value" id="lines">0</span>
        </div>
        <div class="panel-section">
          <span class="label">LEVEL</span>
          <span class="value" id="level">1</span>
        </div>

        <div class="panel-section">
          <span class="label">NEXT</span>
          <canvas id="next-canvas" width="120" height="120"></canvas>
        </div>

        <div class="panel-section controls">
          <span class="label">CONTROLS</span>
          <ul>
            <li><kbd>←</kbd><kbd>→</kbd> mover</li>
            <li><kbd>↑</kbd> rotar</li>
            <li><kbd>↓</kbd> bajar</li>
            <li><kbd>Space</kbd> caída</li>
            <li><kbd>P</kbd> pausa</li>
          </ul>
        </div>
      </aside>
    </div>

    <div id="overlay" class="overlay hidden">
      <div class="overlay-box">
        <p id="overlay-title">GAME OVER</p>
        <p id="overlay-score"></p>
        <div id="gameover-extra" class="hidden">
          <div id="name-entry">
            <input id="name-input" maxlength="8" placeholder="Tu nombre" autocomplete="off" />
            <button id="save-score-btn">Guardar</button>
          </div>
          <div class="highscores">
            <span class="label">TOP SCORES</span>
            <ol id="overlay-highscores-list" class="hs-list"></ol>
            <div id="overlay-highscores-stats" class="hs-stats"></div>
          </div>
        </div>
        <button id="restart-btn">Reiniciar</button>
      </div>
    </div>

    <div id="start-screen" class="overlay">
      <div class="overlay-box">
        <p class="start-title">TETRIS</p>
        <div class="highscores">
          <span class="label">TOP SCORES</span>
          <ol id="start-highscores-list" class="hs-list"></ol>
          <div id="start-highscores-stats" class="hs-stats"></div>
        </div>
        <button id="start-btn">Jugar</button>
        <button id="reset-records-btn" class="secondary-btn">Resetear records</button>
      </div>
    </div>
  </div>

  <script src="game.js"></script>
</body>
</html>
