name: Claude Issue Triage

on:
  issues:
    types: [opened, edited]

jobs:
  triage-issue:
    # Evita re-analizar cuando se edita el cuerpo por el propio bot, o issues que no son el principal (p.ej. bots)
    if: github.event.issue.pull_request == null
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      issues: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Issue Triage
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          allowed_non_write_users: "*"
          prompt: |
            Analiza el issue #${{ github.event.issue.number }} del repositorio ${{ github.repository }}.

            1. Lee el título y el cuerpo del issue con `gh issue view ${{ github.event.issue.number }} --repo ${{ github.repository }}`.
            2. Determina qué labels existentes son apropiados (usa `gh label list --repo ${{ github.repository }}` para ver las disponibles: bug, documentation, duplicate, enhancement, good first issue, help wanted, invalid, question, wontfix). No crees labels nuevos.
            3. Asigna entre 1 y labels apropiadas del issue: `gh issue edit ${{ github.event.issue.number }} --repo ${{ github.repository }} --add-label "<label1>,<label2>"`.
            4. Publica un comentario de diagnóstico con `gh issue comment ${{ github.event.issue.number }} --repo ${{ github.repository }} --body "..."` que incluya:
               - Resumen del problema en 1-2 frases.
               - Posible causa raíz o área del código afectada (si es identificable).
               - Nivel de severidad/prioridad estimado.
               - Próximos pasos sugeridos para implementar la solución.

               El comentario debe estar escrito en formato Markdown válido e interpretable por GitHub (encabezados, listas, negritas, bloques de código con ``` cuando corresponda, etc.).

            No hagas cambios de código ni abras PRs, solo etiqueta y comenta.
          claude_args: |
            --allowedTools "Bash(gh issue view:*),Bash(gh issue edit:*),Bash(gh issue comment:*),Bash(gh label list:*)"
